<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surprise Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="app">
    <!-- 品牌标题 -->
    <h1 class="brand-title">Surprise Tab</h1>

    <!-- 搜索栏 -->
    <div class="search-wrap">
      <form id="searchForm" action="https://www.google.com/search" method="get">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" name="q" id="searchInput" placeholder="搜索一下..." autocomplete="off" autofocus>
      </form>
    </div>

    <!-- 日期 + 模式标签 -->
    <div class="meta-row">
      <span class="date-text" id="dateText"></span>
      <span class="mode-badge" id="modeBadge"></span>
    </div>

    <!-- 游戏区 -->
    <div id="gameZone" style="display:none"></div>

    <!-- 艺术区 -->
    <canvas id="artCanvas" style="display:none"></canvas>

    <!-- 冷笑话区 -->
    <div class="joke-card" id="jokeCard" style="display:none">
      <div class="joke-setup" id="jokeSetup"></div>
      <button class="joke-reveal-btn" id="jokeRevealBtn">揭晓笑点</button>
      <div class="joke-punchline" id="jokePunchline" style="display:none"></div>
    </div>

    <!-- 加载 -->
    <div class="loading" id="loading" style="display:none">
      <div class="loading-spinner"></div>
      <p>准备今天的惊喜...</p>
    </div>

    <!-- 错误 -->
    <div class="error-msg" id="errorMsg" style="display:none">
      <p id="errorText"></p>
      <button class="retry-btn" id="retryBtn">重试</button>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-bar">
      <button class="icon-btn" id="refreshBtn" title="换一个惊喜">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="设置">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
      </button>
    </div>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
